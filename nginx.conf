server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Serve the requested file/dir, otherwise fall through to the 404 handler.
    location / {
        try_files $uri $uri/ =404;
    }

    # Branded 404 page — its inline script logs the missing URL to the tracker.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Don't expose the nginx config itself.
    location = /nginx.conf { return 404; }
}
