server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Astro (build.format:'file') outputs pages like /about.html and
    # /legal/privacy.html, while links use clean URLs like /about and
    # /legal/privacy. Try the exact path, then <path>.html, then a directory,
    # otherwise fall through to the 404 handler.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Branded 404 page — its inline script logs the missing URL to the tracker.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Don't expose the nginx config itself.
    location = /nginx.conf { return 404; }
}
