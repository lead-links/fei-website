# ── Redirects: old (pre-migration) URLs → new paths ──────────────────────────
# 301 permanent. Source of truth: the redirects spreadsheet (col A = old URL,
# col E = target; rows with N/A are intentionally not redirected). Each old URL
# is listed with AND without a trailing slash. Query strings (UTMs) are kept.
# The long HVAC/R key needs a bigger bucket than the nginx default (64).
map_hash_bucket_size 128;

map $uri $fei_redirect {
    default                                                                   "";

    /apply-now-information-fei/                                               /apply;
    /apply-now-information-fei                                                /apply;
    /applying-for-financial-aid/                                              /financial-aid;
    /applying-for-financial-aid                                               /financial-aid;
    /career-education/                                                        /about;
    /career-education                                                         /about;
    /career-services-at-fei/                                                  /support;
    /career-services-at-fei                                                   /support;
    /culinary-arts/                                                           /programs/culinary-arts;
    /culinary-arts                                                            /programs/culinary-arts;
    /employer-job-board/                                                      /support;
    /employer-job-board                                                       /support;
    /employer-partners/                                                       /support;
    /employer-partners                                                        /support;
    /federal-student-aid/                                                     /financial-aid;
    /federal-student-aid                                                      /financial-aid;
    /financial-aid/                                                           /financial-aid;
    /hvac-r-at-fei/                                                           /programs/hvac;
    /hvac-r-at-fei                                                            /programs/hvac;
    /incredible-support/                                                      /support;
    /incredible-support                                                       /support;
    /medical-assistant-fei                                                    /programs/medical-assistant;
    /medical-assistant-fei/                                                   /programs/medical-assistant;
    /medical-billing-and-coding-at-fei/                                       /programs/medical-billing-coding;
    /medical-billing-and-coding-at-fei                                        /programs/medical-billing-coding;
    /mission-statement/                                                       /about;
    /mission-statement                                                        /about;
    /pastry-and-baking-arts-fei/                                              /programs/pastry-baking-arts;
    /pastry-and-baking-arts-fei                                               /programs/pastry-baking-arts;
    /pharmacy-technician-fei/                                                 /programs/pharmacy-technician;
    /pharmacy-technician-fei                                                  /programs/pharmacy-technician;
    /programs/heating-ventilation-air-conditioning-and-refrigeration-hvacr/   /programs/hvac;
    /programs/heating-ventilation-air-conditioning-and-refrigeration-hvacr    /programs/hvac;
    /programs/medical-billing-and-coding/                                     /programs/medical-billing-coding;
    /programs/medical-billing-and-coding                                      /programs/medical-billing-coding;
    /programs/pastry-baking-arts-/                                            /programs/pastry-baking-arts;
    /programs/pastry-baking-arts-                                             /programs/pastry-baking-arts;
    /scholarship/                                                             /financial-aid;
    /scholarship                                                              /financial-aid;
    /student-experience-fei/                                                  /about;
    /student-experience-fei                                                   /about;
    /tel:305-444-1515                                                         /;
    /tel:305-444-1515/                                                        /;
    /visiting/                                                                /admissions;
    /visiting                                                                 /admissions;
    /where-do-i-begin-fei/                                                    /admissions;
    /where-do-i-begin-fei                                                     /admissions;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Old-URL redirects (checked before serving files). Preserve query (UTMs).
    if ($fei_redirect) { return 301 $fei_redirect$is_args$args; }

    # Canonicalize: strip a trailing slash (except root) so /blog/ -> /blog.
    # Astro builds "file" pages (blog.html) alongside nested dirs (blog/), so a
    # bare directory request like /blog/ would otherwise 403.
    location ~ ^(.+)/$ {
        return 301 $1$is_args$args;
    }

    # Astro (build.format:'file') outputs pages like /about.html and
    # /legal/privacy.html, while links use clean URLs like /about and
    # /legal/privacy. Serve the exact file or its .html; never serve a bare
    # directory (that 403s) — unknown paths fall through to the 404 handler.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Branded 404 page — its inline script logs the missing URL to the tracker.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Don't expose the nginx config itself.
    location = /nginx.conf { return 404; }
}
