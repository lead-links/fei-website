<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1A202C" />
  <meta name="robots" content="noindex" />
  <title>Page not found | Florida Education Institute</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --blue: #0072ce; --navy: #1A202C; --gold: #ffb81d;
      --dark-grad: linear-gradient(100deg, #112550 0%, #163a76 52%, #1b4890 100%);
      --display: "Montserrat", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--display); color: #fff; background: var(--navy);
      background-image: var(--dark-grad);
      display: grid; place-items: center; text-align: center;
      padding: 2rem 1.25rem; line-height: 1.6;
    }
    .e404 { max-width: 620px; }
    .e404__logo { width: 84px; height: auto; margin: 0 auto 2rem; display: block; }
    .e404__code {
      font-weight: 800; font-size: clamp(4.5rem, 18vw, 8rem); line-height: 1;
      color: var(--gold); letter-spacing: -.02em; margin: 0;
    }
    .e404__title { font-weight: 700; font-size: clamp(1.5rem, 4vw, 2.1rem); margin: .4rem 0 .8rem; }
    .e404__text { color: rgba(255,255,255,.82); font-size: 1.05rem; margin: 0 auto 2rem; max-width: 46ch; }
    .e404__actions { display: flex; flex-wrap: wrap; gap: .8rem; justify-content: center; }
    .btn {
      font-family: var(--display); font-weight: 700; font-size: .95rem;
      padding: .85em 1.6em; text-decoration: none; display: inline-block; transition: transform .15s ease, background .2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn--gold { background: var(--gold); color: var(--navy); }
    .btn--ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.5); }
    .btn--ghost:hover { border-color: #fff; background: rgba(255,255,255,.08); }
    .e404__phone { margin-top: 2.2rem; font-size: .95rem; color: rgba(255,255,255,.75); }
    .e404__phone a { color: #fff; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <main class="e404">
    <img class="e404__logo" src="/assets/img/fei-logo.png" alt="Florida Education Institute" width="84" height="78" />
    <p class="e404__code">404</p>
    <h1 class="e404__title">This page could not be found</h1>
    <p class="e404__text">The page you are looking for may have moved or no longer exists. Let&rsquo;s get you back on track.</p>
    <div class="e404__actions">
      <a class="btn btn--gold" href="/index.html">Back to home</a>
      <a class="btn btn--ghost" href="/index.html#programs">Explore programs</a>
    </div>
    <p class="e404__phone">Need help? Call <a href="tel:3054441515">305-444-1515</a></p>
  </main>

  <!-- Track the missing URL (fire-and-forget beacon to the 404 log workflow) -->
  <script>
    (function () {
      try {
        var data = new URLSearchParams({ path: location.pathname, ref: document.referrer || "" });
        var url = "https://flow.leadlinks.com.br/webhook/fei-404";
        if (navigator.sendBeacon) {
          navigator.sendBeacon(url, data);
        } else {
          fetch(url, { method: "POST", mode: "no-cors", keepalive: true,
            headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: data.toString() });
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
